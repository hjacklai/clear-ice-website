---
# Bluehost Git Version Control deploy.
# On every "Deploy HEAD Commit", copy the latest files from the cloned repo
# into BOTH website folders so both domains serve the same content.
#
# If your cPanel home path differs, the ~ tilde resolves to your home dir
# (e.g. /home/yourusername/). No hardcoded paths needed.

deployment:
  tasks:
    # ---------- malaysiaclearice ----------
    - /bin/rm -rf ~/public_html/malaysiaclearice/assets
    - /bin/cp -R assets ~/public_html/malaysiaclearice/
    - /bin/cp index.html                       ~/public_html/malaysiaclearice/index.html
    - /bin/cp styles.css                       ~/public_html/malaysiaclearice/styles.css
    - /bin/cp main.js                          ~/public_html/malaysiaclearice/main.js
    - /bin/cp robots.txt                       ~/public_html/malaysiaclearice/robots.txt
    - /bin/cp sitemap.xml                      ~/public_html/malaysiaclearice/sitemap.xml
    - /bin/cp google28fc760a2f195f3a.html      ~/public_html/malaysiaclearice/google28fc760a2f195f3a.html
    - /bin/cp .htaccess                        ~/public_html/malaysiaclearice/.htaccess

    # ---------- clearicesupplier ----------
    - /bin/rm -rf ~/public_html/clearicesupplier/assets
    - /bin/cp -R assets ~/public_html/clearicesupplier/
    - /bin/cp index.html                       ~/public_html/clearicesupplier/index.html
    - /bin/cp styles.css                       ~/public_html/clearicesupplier/styles.css
    - /bin/cp main.js                          ~/public_html/clearicesupplier/main.js
    - /bin/cp robots.txt                       ~/public_html/clearicesupplier/robots.txt
    - /bin/cp sitemap.xml                      ~/public_html/clearicesupplier/sitemap.xml
    - /bin/cp google28fc760a2f195f3a.html      ~/public_html/clearicesupplier/google28fc760a2f195f3a.html
    - /bin/cp .htaccess                        ~/public_html/clearicesupplier/.htaccess
