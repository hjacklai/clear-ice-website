---
# Bluehost Git Version Control deploy.
# Uses absolute paths to avoid ~ expansion ambiguity.
# Wipes target folder contents first (keeps folder itself) then redeploys.

deployment:
  tasks:
    # ---------- malaysiaclearice ----------
    - /bin/rm -rf /home1/oxzaanmy/public_html/malaysiaclearice/assets
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/index.html
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/styles.css
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/main.js
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/robots.txt
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/sitemap.xml
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/google28fc760a2f195f3a.html
    - /bin/rm -f  /home1/oxzaanmy/public_html/malaysiaclearice/.htaccess
    - /bin/cp -R  assets /home1/oxzaanmy/public_html/malaysiaclearice/assets
    - /bin/cp     index.html /home1/oxzaanmy/public_html/malaysiaclearice/index.html
    - /bin/cp     styles.css /home1/oxzaanmy/public_html/malaysiaclearice/styles.css
