    - /bin/cp     google28fc760a2f195f3a.html /home1/oxzaanmy/public_html/malaysiaclearice/google28fc760a2f195f3a.html
    - /bin/cp     .htaccess /home1/oxzaanmy/public_html/malaysiaclearice/.htaccess

    # ---------- clearicesupplier ----------
